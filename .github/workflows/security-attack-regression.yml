name: Security Attack Regression
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/security-attack-regression.yml"
      - "cloud-proxy/**"
      - "docker-compose.yaml"
      - "mocks/external_api.yaml"
      - "nginx/**"
      - "prompt-router/**"
      - "scripts/linux/docker-entrypoint.sh"
      - "scripts/security/**"
      - "src/**"
      - "test/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/security-attack-regression.yml"
      - "cloud-proxy/**"
      - "docker-compose.yaml"
      - "mocks/external_api.yaml"
      - "nginx/**"
      - "prompt-router/**"
      - "scripts/linux/docker-entrypoint.sh"
      - "scripts/security/**"
      - "src/**"
      - "test/**"
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  compose-attack-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Prepare attack-regression environment
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2-utils
          cp sample.env .env
          ATTACK_CI_LLM_HOST="mock_external_api:4010"
          cat <<'EOF' >> .env
          ENABLE_HTTPS=true
          RATE_LIMIT_REQUESTS=3
          RATE_LIMIT_WINDOW=60
          SHARED_SECRET=attack-ci-secret
          EOF
          printf 'LOCAL_LLM_URL=http://%s/analyze\n' "$ATTACK_CI_LLM_HOST" >> .env
          bash ./scripts/linux/generate_secrets.sh --update-env
      - name: Start compose stack
        run: |
          docker compose \
            -f docker-compose.yaml \
            up -d --wait \
            mock_external_api \
            postgres \
            redis \
            escalation_engine \
            tarpit_api \
            admin_ui \
            cloud_proxy \
            prompt_router \
            nginx_proxy
      - name: Run attack regression probes
        run: |
          mkdir -p artifacts
          python scripts/security/attack_regression.py \
            --nginx-http-base "http://127.0.0.1:8088" \
            --nginx-https-base "https://127.0.0.1:8443" \
            --admin-ui-base "http://127.0.0.1:5002" \
            --prompt-router-base "http://127.0.0.1:8009" \
            --prompt-shared-secret "attack-ci-secret" \
            --json | tee artifacts/attack-regression.json
      - name: Collect compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f docker-compose.yaml ps > artifacts/compose-ps.txt || true
          docker compose -f docker-compose.yaml logs --no-color > artifacts/compose.log || true
      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: security-attack-regression-artifacts
          path: artifacts/
          if-no-files-found: ignore
      - name: Tear down compose stack
        if: always()
        run: |
          docker compose -f docker-compose.yaml down -v --remove-orphans
