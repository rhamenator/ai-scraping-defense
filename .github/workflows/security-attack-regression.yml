name: Security Attack Regression
on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Hosted attack-regression mode"
        required: true
        default: compose-v1
        type: choice
        options:
          - compose-v1
          - staging-v1
      target_nginx_http_base:
        description: "Required for staging-v1. Use https:// for hosted targets; http:// is allowed only for localhost/127.0.0.1 loopback runs."
        required: false
        type: string
      target_nginx_https_base:
        description: "Required for staging-v1. Example: https://staging.example.test"
        required: false
        type: string
      target_admin_ui_base:
        description: "Required for staging-v1. Example: https://admin.example.test"
        required: false
        type: string
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/security-attack-regression.yml"
      - "cloud-proxy/**"
      - "docker-compose.yaml"
      - "mocks/external_api.yaml"
      - "nginx/**"
      - "prompt-router/**"
      - "scripts/linux/docker-entrypoint.sh"
      - "scripts/security/**"
      - "src/**"
      - "test/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/security-attack-regression.yml"
      - "cloud-proxy/**"
      - "docker-compose.yaml"
      - "mocks/external_api.yaml"
      - "nginx/**"
      - "prompt-router/**"
      - "scripts/linux/docker-entrypoint.sh"
      - "scripts/security/**"
      - "src/**"
      - "test/**"
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  compose-attack-regression:
    if: github.event_name != 'workflow_dispatch' || inputs.profile == 'compose-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Prepare attack-regression environment
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2-utils
          cp sample.env .env
          mkdir -p nginx/certs
          if [ ! -f nginx/certs/tls.crt ] || [ ! -f nginx/certs/tls.key ]; then
            openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
              -keyout nginx/certs/tls.key \
              -out nginx/certs/tls.crt \
              -subj "/CN=localhost"
            chmod 600 nginx/certs/tls.key
          fi
          ATTACK_CI_LLM_SCHEME="http"
          ATTACK_CI_LLM_HOST="mock_external_api"
          ATTACK_CI_LLM_PORT="4010"
          ATTACK_CI_LLM_PATH="/analyze"
          cat <<'EOF' >> .env
          ENABLE_HTTPS=true
          RATE_LIMIT_REQUESTS=3
          RATE_LIMIT_WINDOW=60
          SHARED_SECRET=attack-ci-secret
          EOF
          printf 'LOCAL_LLM_URL=%s://%s:%s%s\n' \
            "$ATTACK_CI_LLM_SCHEME" \
            "$ATTACK_CI_LLM_HOST" \
            "$ATTACK_CI_LLM_PORT" \
            "$ATTACK_CI_LLM_PATH" >> .env
          bash ./scripts/linux/generate_secrets.sh --update-env
      - name: Start compose stack
        run: |
          pull_with_retry() {
            local image="$1"
            local attempt
            for attempt in 1 2 3; do
              if docker pull "$image"; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                return 1
              fi
              sleep $((attempt * 10))
            done
          }

          compose_up_with_retry() {
            local attempt
            for attempt in 1 2 3; do
              if docker compose \
                -f docker-compose.yaml \
                up -d --wait \
                mock_external_api \
                postgres \
                redis \
                escalation_engine \
                tarpit_api \
                admin_ui \
                cloud_proxy \
                prompt_router \
                nginx_proxy; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                return 1
              fi
              docker compose -f docker-compose.yaml down -v --remove-orphans || true
              sleep $((attempt * 15))
            done
          }

          pull_with_retry "python:3.11-slim"
          compose_up_with_retry
      - name: Run attack regression probes
        run: |
          mkdir -p artifacts
          python scripts/security/attack_regression.py \
            --profile "compose-v1" \
            --nginx-http-base "http://127.0.0.1:8088" \
            --nginx-https-base "https://127.0.0.1:8443" \
            --admin-ui-base "http://127.0.0.1:5002" \
            --prompt-router-base "http://127.0.0.1:8009" \
            --prompt-shared-secret "attack-ci-secret" \
            --allow-host "127.0.0.1" \
            --output-path artifacts/attack-regression.json \
            --json | tee artifacts/attack-regression.stdout.json
      - name: Collect compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f docker-compose.yaml ps > artifacts/compose-ps.txt || true
          docker compose -f docker-compose.yaml logs --no-color > artifacts/compose.log || true
      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: security-attack-regression-artifacts
          path: artifacts/
          if-no-files-found: ignore
      - name: Tear down compose stack
        if: always()
        run: |
          docker compose -f docker-compose.yaml down -v --remove-orphans

  hosted-staging-attack-regression:
    if: github.event_name == 'workflow_dispatch' && inputs.profile == 'staging-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Validate hosted staging target contract
        run: |
          set -euo pipefail
          for var_name in \
            TARGET_NGINX_HTTP_BASE \
            TARGET_NGINX_HTTPS_BASE \
            TARGET_ADMIN_UI_BASE
          do
            value="${!var_name:-}"
            if [ -z "$value" ]; then
              echo "Missing required workflow_dispatch input for staging-v1: ${var_name,,}" >&2
              exit 1
            fi
          done

          if [[ ! "$TARGET_NGINX_HTTPS_BASE" =~ ^https:// ]]; then
            echo "TARGET_NGINX_HTTPS_BASE must use https:// for staging-v1" >&2
            exit 1
          fi

          if [[ ! "$TARGET_ADMIN_UI_BASE" =~ ^https:// ]]; then
            echo "TARGET_ADMIN_UI_BASE must use https:// for staging-v1" >&2
            exit 1
          fi

          if [[ "$TARGET_NGINX_HTTP_BASE" =~ ^http:// ]]; then
            if [[ ! "$TARGET_NGINX_HTTP_BASE" =~ ^http://(127\.0\.0\.1|localhost)(:|/|$) ]]; then
              echo "TARGET_NGINX_HTTP_BASE may only use http:// for localhost or 127.0.0.1 loopback targets" >&2
              exit 1
            fi
          elif [[ ! "$TARGET_NGINX_HTTP_BASE" =~ ^https:// ]]; then
            echo "TARGET_NGINX_HTTP_BASE must start with https:// unless it targets localhost/127.0.0.1 over http://" >&2
            exit 1
          fi
        env:
          TARGET_NGINX_HTTP_BASE: ${{ inputs.target_nginx_http_base }}
          TARGET_NGINX_HTTPS_BASE: ${{ inputs.target_nginx_https_base }}
          TARGET_ADMIN_UI_BASE: ${{ inputs.target_admin_ui_base }}
      - name: Run hosted staging attack regression
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mapfile -t allow_hosts < <(
            python - <<'PY' \
              "${{ inputs.target_nginx_http_base }}" \
              "${{ inputs.target_nginx_https_base }}" \
              "${{ inputs.target_admin_ui_base }}"
            import sys
            from urllib.parse import urlparse

            hosts = []
            for value in sys.argv[1:]:
              host = urlparse(value).hostname
              if host and host not in hosts:
                hosts.append(host)
            for host in hosts:
              print(host)
            PY
          )
          args=()
          for host in "${allow_hosts[@]}"; do
            args+=(--allow-host "$host")
          done
          python scripts/security/attack_regression.py \
            --profile "staging-v1" \
            --nginx-http-base "${{ inputs.target_nginx_http_base }}" \
            --nginx-https-base "${{ inputs.target_nginx_https_base }}" \
            --admin-ui-base "${{ inputs.target_admin_ui_base }}" \
            "${args[@]}" \
            --output-path artifacts/attack-regression.json \
            --json | tee artifacts/attack-regression.stdout.json
      - name: Upload hosted staging artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: security-attack-regression-staging-artifacts
          path: artifacts/
          if-no-files-found: ignore
