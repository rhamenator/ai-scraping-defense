name: Rust Nightly Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: ["main"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/tests.yml"

permissions:
  contents: read

jobs:
  nightly-rust:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
      - name: Install Rust nightly
        run: |
          sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
          curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain nightly
          source "$HOME/.cargo/env"
          rustup default nightly
      - name: Run nightly Rust smoke tests
        run: |
          source "$HOME/.cargo/env"
          if [ -f Cargo.toml ]; then
            rustup run nightly cargo test --quiet
          fi
          rustup run nightly cargo test --manifest-path jszip-rs/Cargo.toml --quiet
          rustup run nightly cargo test --manifest-path markov-train-rs/Cargo.toml --quiet
